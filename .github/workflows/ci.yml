name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: interview_copilot_test
          POSTGRES_USER: interview_copilot
          POSTGRES_PASSWORD: interview_copilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U interview_copilot -d interview_copilot_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      OPENAI_API_KEY: ""
      OPENAI_MODEL: gpt-4.1-mini
      DATABASE_URL: postgresql://interview_copilot:interview_copilot@localhost:5432/interview_copilot_test
      TEST_DATABASE_URL: postgresql://interview_copilot:interview_copilot@localhost:5432/interview_copilot_test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        run: pytest -q
